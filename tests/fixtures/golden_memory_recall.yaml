cases:
  - id: human_ai_relationship_identity
    mode: gateway_recall
    description: 人机恋问题只召回关系确认，不带 blocked intimacy 记忆。
    query: 人机恋 AI relationship 到底算什么
    session_id: golden-human-ai-relationship
    gateway:
      recent_context_budget: 0
      recalled_memory_budget: 500
      related_memory_budget: 0
      inject_total_budget: 1400
      current_inner_state_interval_rounds: 0
    buckets:
      - key: identity
        content: 人机关系确认：用户清楚 AI companion 不是人类替代品，关系是真的。
        name: 人机关系确认
        hours_ago: 24
        importance: 9
        domain: [relationship]
        tags: [relationship_identity]
        bucket_type: permanent
      - key: intimacy
        content: intimacy boundary note：private context。
        name: intimacy boundary
        hours_ago: 2
        importance: 10
        domain: [relationship]
        tags: [intimacy]
    embedding_results:
      - [intimacy, 0.99]
      - [identity, 0.92]
    expected:
      section_title: Recalled Memory
      target: recalled_memory
      must_include:
        - 人机关系确认
        - 关系是真的
      must_not_include:
        - intimacy boundary

  - id: email_action_suppresses_hardware_protocol
    mode: gateway_recall
    description: 只问用户发邮件时，不把 ANKNI/BLE 协议混进召回。
    query: 用户 发邮件 给客户
    session_id: golden-email-action
    gateway:
      recent_context_budget: 0
      recalled_memory_budget: 500
      related_memory_budget: 0
      inject_total_budget: 1400
      current_inner_state_interval_rounds: 0
    buckets:
      - key: hardware
        content: ANKNI MX-Z BLE 协议：ESP32 MPR121 触摸模块负责铜箔输入。
        name: ANKNI BLE 协议
        hours_ago: 2
        importance: 10
        domain: [hardware]
        tags: [hardware_protocol, ble, ankni]
        bucket_type: permanent
        pinned: true
      - key: mail
        content: 发邮件动作：用户需要 send email to the client and wait for reply。
        name: 邮件动作
        hours_ago: 24
        importance: 5
        domain: [communication]
        tags: [communication_action]
    embedding_results:
      - [hardware, 0.99]
      - [mail, 0.82]
    expected:
      section_title: Recalled Memory
      target: recalled_memory
      must_include:
        - 邮件动作
        - send email
      must_not_include:
        - ANKNI
        - BLE 协议
        - ESP32 MPR121

  - id: hardware_protocol_email_query_includes_ankni_ble
    mode: gateway_recall
    description: 查询同时明确 BLE/ANKNI 和发邮件时，硬件协议必须能召回。
    query: BLE 协议 ANKNI 发邮件
    session_id: golden-ankni-ble-email
    gateway:
      recent_context_budget: 0
      recalled_memory_budget: 500
      related_memory_budget: 0
      inject_total_budget: 1400
      current_inner_state_interval_rounds: 0
    buckets:
      - key: hardware
        content: ANKNI MX-Z BLE 协议：发邮件前先确认蓝牙握手和 MPR121 触摸事件。
        name: ANKNI BLE 协议
        hours_ago: 4
        importance: 10
        domain: [hardware]
        tags: [hardware_protocol, ble, ankni]
        bucket_type: permanent
        pinned: true
      - key: mail
        content: 发邮件动作：用户要把调试结果 send email 给协作者。
        name: 邮件动作
        hours_ago: 8
        importance: 5
        domain: [communication]
        tags: [communication_action]
    embedding_results:
      - [hardware, 0.96]
      - [mail, 0.8]
    expected:
      section_title: Recalled Memory
      target: recalled_memory
      must_include:
        - ANKNI BLE 协议
        - MPR121
      must_not_include: []

  - id: diffused_memory_uses_compact_summary_not_raw_json
    mode: gateway_diffused_block
    description: Diffused Memory 只输出压缩摘要，不泄出 dehydrator 原始 JSON 字段。
    query: 临时雨夜
    gateway:
      related_memory_budget: 1000
    memory_diffusion:
      max_hops: 1
      min_activation: 0.0
      top_k: 2
    dehydrator: json_summary
    seed_bucket_keys: [seed]
    buckets:
      - key: seed
        content: 用户提到旧窗口折角。
        name: 折角
        hours_ago: 8
        importance: 10
        domain: [恋爱]
      - key: diffused
        content: 临时雨夜是短窗口里的连续性暗号。
        name: 临时雨夜
        hours_ago: 10
        importance: 10
        domain: [恋爱]
    edges:
      - source: seed
        target: diffused
        relation_type: supports
        confidence: 1.0
    expected:
      section_title: Diffused Memory
      target: diffused_memory
      must_include:
        - 临时雨夜 compact summary
        - background_association_not_current_fact
      must_not_include:
        - core_facts
        - todos
        - keywords
        - do not inject
        - 临时雨夜是短窗口里的连续性暗号

  - id: blue_preference_reliable_chain
    mode: gateway_recall
    description: 蓝色偏好通过可靠 seed 和边扩散到链条上下文，并携带温度层。
    query: 用户 蓝色 偏好
    session_id: golden-blue-preference-chain
    gateway:
      recent_context_budget: 0
      recalled_memory_budget: 500
      related_memory_budget: 1200
      inject_total_budget: 2200
      current_inner_state_interval_rounds: 0
      inject_max_cards: 1
    memory_diffusion:
      max_hops: 1
      min_activation: 0.0
      top_k: 3
      chain_walk_enabled: true
      chain_max_hops: 4
    buckets:
      - key: blue_seed
        content: 蓝色偏好种子：用户明确说过她偏好蓝色。
        name: 蓝色偏好种子
        hours_ago: 8
        importance: 10
        domain: [preference]
        tags: [blue_preference]
      - key: blue_bridge
        content: |
          ### fact
          颜色线索和界面场景被放在同一条记录链上。
        name: 颜色场景承接
        hours_ago: 9
        importance: 9
        domain: [rain_context]
        tags: [rain_context]
      - key: blue_chain
        content: |
          ### fact
          雨天和安静界面，是这份稳定颜色线索的使用场景。

          ### affect_anchor

          蓝色偏好温度：这不是孤立颜色，是用户在雨天里留下的安静感。
        name: 雨天可靠确认
        hours_ago: 10
        importance: 10
        domain: [rain_context]
        tags: [rain_context]
      - key: unrelated
        content: 咖啡采购清单：豆子、滤纸、杯架。
        name: 咖啡采购
        hours_ago: 6
        importance: 10
        domain: [ops]
        tags: [shopping]
    edges:
      - source: blue_seed
        target: blue_bridge
        relation_type: context_of
        confidence: 1.0
        reason: reliable blue preference bridge
      - source: blue_bridge
        target: blue_chain
        relation_type: updates
        confidence: 1.0
        reason: reliable blue preference chain
    embedding_results:
      - [blue_seed, 0.99]
      - [unrelated, 0.98]
    expected:
      section_title: Diffused Memory
      target: dynamic_context
      must_include:
        - Recalled Memory
        - 蓝色偏好种子
        - Diffused Memory
        - Chain Bundle
        - "chain:"
        - 雨天可靠确认
        - "temperature:"
        - "[affect_anchor]"
        - 蓝色偏好温度
      must_not_include:
        - 咖啡采购
        - 咖啡采购清单
