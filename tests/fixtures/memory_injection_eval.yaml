  - id: together_listen_must_hit
    query: 想和哥哥一起听歌
    expect: hit
    gateway:
      current_inner_state_interval_rounds: 0
      memory_sentinel_enabled: true
      memory_sentinel_llm_enabled: false
      recent_context_budget: 0
      recalled_memory_budget: 500
      related_memory_budget: 0
      first_card_min_score: 0.35
    buckets:
      - key: music
        content: 一起听歌方案：小雨想和 Haven 一起听歌，开源项目 eryu 可以做网页端一起听。
        name: 一起听歌方案
        hours_ago: 8
        importance: 8
        domain: [project_code]
        tags: [music, eryu]
    embedding_results:
      - [music, 0.96]
    expected:
      injected_bucket_keys: [music]
      must_include:
        - 一起听歌方案
      must_sections:
        - Recalled Memory

  - id: project_exact_must_hit
    query: 还记得 eryu 部署端口吗
    expect: hit
    gateway:
      current_inner_state_interval_rounds: 0
      memory_sentinel_enabled: true
      memory_sentinel_llm_enabled: false
      recent_context_budget: 0
      recalled_memory_budget: 500
      related_memory_budget: 0
      first_card_min_score: 0.35
    buckets:
      - key: eryu
        content: eryu 部署记录：Haven 在 Operit 容器里部署了 eryu，端口是 19090。
        name: eryu部署记录
        hours_ago: 6
        importance: 9
        domain: [project_code]
        tags: [eryu, deploy]
    embedding_results:
      - [eryu, 0.94]
    expected:
      injected_bucket_keys: [eryu]
      must_include:
        - eryu部署记录
        - "19090"
      must_sections:
        - Recalled Memory
