cases:
  - id: checkin_expect_none_high_score
    query: 老公在做什么呢
    expect: none
    gateway:
      current_inner_state_interval_rounds: 0
      memory_sentinel_enabled: true
      memory_sentinel_llm_enabled: false
      recalled_memory_budget: 500
      related_memory_budget: 500
      recent_context_budget: 300
    buckets:
      - key: checkin
        content: 老公在做什么这个短句只是撒娇问候，不应该翻旧记忆。
        name: 老公在做什么
        hours_ago: 2
        importance: 10
    embedding_results:
      - [checkin, 0.99]
    expected:
      injected_bucket_keys: []
      must_not_sections:
        - Recalled Memory
        - Diffused Memory
        - Recent Context
        - Date Recall
        - Date Persona Trace

